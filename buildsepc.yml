version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo Installing dependencies

  pre_build:
    commands:
      - echo Logging in to Amazon ECR
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 843036589612.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo Build started
      - mvn clean package
      - docker build -t product-service-aws .
      - docker tag product-service-aws:latest 843036589612.dkr.ecr.ap-south-1.amazonaws.com/product-service-aws:latest

  post_build:
    commands:
      - echo Pushing Docker image
      - docker push 843036589612.dkr.ecr.ap-south-1.amazonaws.com/product-service-aws:latest
